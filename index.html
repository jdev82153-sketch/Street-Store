<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Street Store | Moda Urbana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black:    #0a0a0a;
      --dark:     #111111;
      --card-bg:  #181818;
      --gold:     #d4a017;
      --gold-lt:  #f0c940;
      --white:    #f5f5f5;
      --gray:     #888888;
      --border:   #2a2a2a;
      --accent:   #c8860a;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--black);
      color: var(--white);
      overflow-x: hidden;
      cursor: none;
    }

    /* ===== CUSTOM CURSOR ===== */
    .cursor {
      width: 12px; height: 12px;
      background: var(--gold);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease;
    }
    .cursor-ring {
      width: 36px; height: 36px;
      border: 1.5px solid var(--gold);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.18s ease, width 0.2s, height 0.2s;
      opacity: 0.5;
    }
    body:hover .cursor-ring { opacity: 1; }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

    /* ===== NOISE TEXTURE OVERLAY ===== */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.4;
    }

    /* ===== NAVBAR ===== */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 100;
      padding: 18px 5%;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s;
    }

    .nav-logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none;
    }
    .nav-logo img {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      object-fit: cover;
    }
    .nav-logo-text {
      font-family: 'Dancing Script', cursive;
      font-size: 1.6rem;
      color: var(--white);
      letter-spacing: 1px;
    }
    .nav-logo-text span { color: var(--gold); }

    .nav-links {
      display: flex; gap: 32px; list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      color: var(--gray);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.3s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute; bottom: -4px; left: 0;
      width: 0; height: 1px;
      background: var(--gold);
      transition: width 0.3s;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-links a:hover::after { width: 100%; }

    .nav-cta {
      background: var(--gold);
      color: var(--black) !important;
      padding: 8px 20px;
      border-radius: 2px;
      font-weight: 700 !important;
    }
    .nav-cta:hover { background: var(--gold-lt); color: var(--black) !important; }
    .nav-cta::after { display: none !important; }

    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
    .hamburger span { width: 26px; height: 2px; background: var(--white); transition: 0.3s; }

    /* ===== HERO ===== */
    #inicio {
      min-height: 100vh;
      display: flex; align-items: center;
      position: relative;
      overflow: hidden;
      padding: 120px 5% 60px;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 70% 50%, rgba(212,160,23,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 20% 80%, rgba(212,160,23,0.06) 0%, transparent 60%),
        var(--black);
    }

    .hero-grid-lines {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(212,160,23,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,160,23,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .hero-content {
      position: relative; z-index: 2;
      max-width: 640px;
    }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(212,160,23,0.12);
      border: 1px solid rgba(212,160,23,0.3);
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 28px;
      animation: fadeUp 0.8s ease both;
    }
    .hero-badge::before { content: '👑'; font-size: 0.85rem; }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 10vw, 8rem);
      line-height: 0.92;
      letter-spacing: 2px;
      animation: fadeUp 0.8s 0.1s ease both;
    }
    .hero-title .gold { color: var(--gold); }

    .hero-subtitle {
      margin-top: 24px;
      font-size: 1rem;
      color: var(--gray);
      line-height: 1.8;
      font-weight: 400;
      max-width: 480px;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .hero-actions {
      margin-top: 40px;
      display: flex; gap: 16px; flex-wrap: wrap;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    .btn-primary {
      background: var(--gold);
      color: var(--black);
      padding: 14px 36px;
      border: none; border-radius: 2px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
      box-shadow: 0 0 0 0 rgba(212,160,23,0.4);
    }
    .btn-primary:hover {
      background: var(--gold-lt);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(212,160,23,0.3);
    }

    .btn-outline {
      border: 1.5px solid var(--gold);
      color: var(--gold);
      padding: 13px 34px;
      border-radius: 2px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.3s, color 0.3s, transform 0.2s;
      background: transparent;
    }
    .btn-outline:hover {
      background: var(--gold);
      color: var(--black);
      transform: translateY(-2px);
    }

    .hero-image-wrap {
      position: absolute;
      right: 5%; top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      animation: fadeLeft 1s 0.2s ease both;
    }
    .hero-logo-big {
      width: clamp(200px, 28vw, 380px);
      border-radius: 50%;
      border: 3px solid var(--gold);
      box-shadow: 0 0 80px rgba(212,160,23,0.25), 0 0 20px rgba(212,160,23,0.1);
      animation: float 4s ease-in-out infinite;
    }

    .hero-stats {
      position: absolute;
      bottom: 48px; left: 5%;
      display: flex; gap: 48px;
      animation: fadeUp 0.8s 0.5s ease both;
      z-index: 2;
    }
    .stat-item { text-align: center; }
    .stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      color: var(--gold);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.65rem;
      color: var(--gray);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .stat-divider { width: 1px; background: var(--border); }

    /* ===== MARQUEE ===== */
    .marquee-wrap {
      overflow: hidden;
      background: var(--gold);
      padding: 14px 0;
      position: relative; z-index: 1;
    }
    .marquee-track {
      display: flex; gap: 0;
      animation: marquee 20s linear infinite;
      white-space: nowrap;
    }
    .marquee-item {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 3px;
      color: var(--black);
      padding: 0 32px;
      display: flex; align-items: center; gap: 16px;
    }
    .marquee-item::after { content: '★'; font-size: 0.8rem; }

    /* ===== SECTION SHARED ===== */
    section { padding: 100px 5%; position: relative; z-index: 1; }

    .section-tag {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-tag::before { content: ''; width: 32px; height: 1px; background: var(--gold); }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      line-height: 1;
      letter-spacing: 1px;
    }
    .section-title span { color: var(--gold); }

    /* ===== SOBRE ===== */
    #sobre {
      background: var(--dark);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .sobre-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }

    .sobre-visual {
      position: relative;
    }
    .sobre-logo-wrap {
      width: 100%; max-width: 380px;
      margin: 0 auto;
      position: relative;
    }
    .sobre-logo {
      width: 100%;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: block;
    }
    .sobre-gold-ring {
      position: absolute; inset: -12px;
      border-radius: 50%;
      border: 1px solid rgba(212,160,23,0.3);
      animation: spin 20s linear infinite;
    }
    .sobre-gold-ring::before {
      content: '★';
      position: absolute; top: 0; left: 50%;
      transform: translateX(-50%);
      font-size: 1rem; color: var(--gold);
    }
    .sobre-float-badge {
      position: absolute;
      bottom: 10px; right: -20px;
      background: var(--gold);
      color: var(--black);
      padding: 10px 18px;
      border-radius: 4px;
      font-weight: 900;
      font-size: 0.85rem;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .sobre-text .section-tag { margin-top: 0; }
    .sobre-desc {
      margin-top: 20px;
      color: var(--gray);
      line-height: 1.9;
      font-size: 0.95rem;
    }

    .sobre-features {
      margin-top: 36px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .feature-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: border-color 0.3s, transform 0.2s;
    }
    .feature-item:hover {
      border-color: var(--gold);
      transform: translateX(6px);
    }
    .feature-icon { font-size: 1.4rem; }
    .feature-text strong { display: block; font-size: 0.9rem; margin-bottom: 2px; }
    .feature-text span { font-size: 0.8rem; color: var(--gray); }

    /* ===== CATALOGO ===== */
    #catalogo { background: var(--black); }

    .catalog-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 60px;
    }
    .catalog-filters {
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--gray);
      border-radius: 2px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(212,160,23,0.08);
    }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    .product-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
      position: relative;
    }
    .product-card:hover {
      border-color: var(--gold);
      transform: translateY(-8px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,160,23,0.1);
    }

    .product-img-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 3/4;
      background: #1c1c1c;
    }
    .product-img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
      display: block;
    }
    .product-card:hover .product-img { transform: scale(1.06); }

    .product-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 24px;
    }
    .product-card:hover .product-overlay { opacity: 1; }

    .btn-whatsapp {
      background: #25D366;
      color: #fff;
      padding: 10px 24px;
      border-radius: 2px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      display: flex; align-items: center; gap: 8px;
      transition: background 0.3s;
    }
    .btn-whatsapp:hover { background: #1fba59; }

    .product-badge {
      position: absolute; top: 14px; left: 14px;
      background: var(--gold);
      color: var(--black);
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
    }

    .product-info {
      padding: 20px;
    }
    .product-name {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .product-category {
      font-size: 0.72rem;
      color: var(--gray);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .product-footer {
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
    .product-price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: var(--gold);
      letter-spacing: 1px;
    }
    .product-price small {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      color: var(--gray);
      display: block;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .product-sizes {
      display: flex; gap: 4px;
    }
    .size-tag {
      width: 28px; height: 28px;
      border: 1px solid var(--border);
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--gray);
      transition: border-color 0.2s, color 0.2s;
      cursor: pointer;
    }
    .size-tag:hover { border-color: var(--gold); color: var(--gold); }

    .catalog-cta {
      text-align: center;
      margin-top: 60px;
    }
    .catalog-cta p {
      color: var(--gray);
      font-size: 0.88rem;
      margin-bottom: 20px;
    }

    /* ===== COMO COMPRAR ===== */
    #como-comprar {
      background: var(--dark);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .steps-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      margin-top: 60px;
    }
    .step-card {
      text-align: center;
      padding: 36px 24px;
      border: 1px solid var(--border);
      border-radius: 4px;
      position: relative;
      transition: border-color 0.3s, transform 0.3s;
      background: var(--card-bg);
    }
    .step-card:hover {
      border-color: var(--gold);
      transform: translateY(-4px);
    }
    .step-card:not(:last-child)::after {
      content: '→';
      position: absolute;
      right: -18px; top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      color: var(--gold);
      z-index: 2;
    }
    .step-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      color: rgba(212,160,23,0.15);
      line-height: 1;
      margin-bottom: 8px;
    }
    .step-icon { font-size: 2rem; margin-bottom: 14px; }
    .step-title {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 8px;
    }
    .step-desc {
      font-size: 0.82rem;
      color: var(--gray);
      line-height: 1.7;
    }

    /* ===== LOJA FISICA ===== */
    #loja {
      background: var(--black);
    }
    .loja-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }
    .loja-info { }
    .loja-info .section-tag { margin-bottom: 14px; }
    .loja-details {
      margin-top: 36px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .loja-detail-item {
      display: flex; align-items: flex-start; gap: 16px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--card-bg);
    }
    .detail-icon {
      font-size: 1.6rem;
      min-width: 40px; text-align: center;
    }
    .detail-text strong {
      display: block; font-size: 0.78rem;
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--gold); margin-bottom: 4px;
    }
    .detail-text span { font-size: 0.92rem; color: var(--gray); line-height: 1.6; }

    .loja-map-wrap {
      position: relative;
    }
    .map-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      aspect-ratio: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 40px;
    }
    .map-pin-icon { font-size: 3.5rem; }
    .map-address {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      line-height: 1.2;
      color: var(--white);
    }
    .map-city {
      font-size: 0.8rem;
      color: var(--gold);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .map-open-btn {
      margin-top: 12px;
      background: var(--gold);
      color: var(--black);
      padding: 12px 28px;
      border-radius: 2px;
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: background 0.3s;
    }
    .map-open-btn:hover { background: var(--gold-lt); }

    /* ===== INSTAGRAM ===== */
    #instagram {
      background: var(--dark);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .insta-header { margin-bottom: 50px; }
    .insta-handle {
      font-size: 1.2rem;
      color: var(--gold);
      font-weight: 600;
      margin-top: 12px;
    }
    .insta-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
